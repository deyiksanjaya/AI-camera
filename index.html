<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Magic Camera</title>
    
    <!-- KUNCI UNTUK IOS HOMESCREEN ICON -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/deyiksanjaya/AI-camera/refs/heads/main/icon-512.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        video::-webkit-media-controls,
        video::-webkit-media-controls-enclosure,
        video::-webkit-media-controls-overlay-play-button,
        video::-webkit-media-controls-start-playback-button {
            display: none !important;
            -webkit-appearance: none !important;
        }
        video { pointer-events: none; }
        
        .shutter-flash { animation: flash 0.15s ease-out; }
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        #gallery-original { transition: opacity 1.5s ease-in-out; }
        
        /* Input fix for mobile */
        input, textarea {
            font-size: 16px !important;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        /* Custom Scrollbar for Settings */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4); 
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-white select-none bg-black">

    <!-- Video Stream Fullscreen -->
    <video id="camera-stream" autoplay playsinline muted class="fixed inset-0 w-full h-full object-cover z-0"></video>
    <div id="flash-overlay" class="fixed inset-0 bg-white z-20 opacity-0 pointer-events-none"></div>

    <!-- Notification Banner -->
    <div id="notification-banner" class="fixed top-[-100px] left-1/2 -translate-x-1/2 bg-[#1c1c1d]/90 text-white px-5 py-3 rounded-full flex items-center gap-3 shadow-2xl transition-all duration-500 ease-out z-[150] pointer-events-none border border-white/10 w-max max-w-[90%]">
        <span id="notification-text" class="text-[14px] font-semibold tracking-wide truncate">Memproses...</span>
    </div>

    <!-- Top Solid Translucent Background -->
    <div class="fixed top-0 left-0 w-full h-[75px] bg-black/60 pointer-events-none z-0"></div>

    <!-- Top Right Controls (Pill diturunkan ke bawah latar transparan) -->
    <div class="fixed top-[80px] right-4 bg-black/50 rounded-full px-3.5 py-2 flex items-center gap-4 z-10 border border-white/10">
        <!-- Moon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <!-- Flash A -->
        <div class="relative flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            <span id="flash-auto-text" class="absolute -right-1.5 -bottom-1 text-[8px] font-bold bg-[#1c1c1d] text-white rounded-full px-[3px] leading-none tracking-tighter transition-opacity duration-300">A</span>
        </div>
        <!-- Grid Dots -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
            <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            <circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
        </svg>
    </div>

    <!-- Bottom Controls Container -->
    <div class="fixed bottom-0 left-0 w-full z-10 flex flex-col pointer-events-none">
        
        <!-- Floating Elements Area (Zoom & Shutter over the camera stream) -->
        <div class="w-full flex flex-col items-center pb-4">
            
            <!-- Zoom Controls -->
            <div class="flex items-center justify-center gap-5 mb-5 pointer-events-auto">
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer">0,5</span>
                
                <div class="w-9 h-9 bg-[#1c1c1d]/60 rounded-full flex items-center justify-center border border-white/10 cursor-pointer shadow-lg">
                    <span class="text-[#ffd60a] text-[13px] font-semibold">1x</span>
                </div>
                
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer">2</span>
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer">4</span>
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer">8</span>
            </div>

            <!-- Shutter Button -->
            <div class="flex justify-center pointer-events-auto">
                <div id="shutter-btn" class="w-[70px] h-[70px] rounded-full border-[3px] border-white/90 flex items-center justify-center cursor-pointer active:scale-95 transition-transform bg-transparent">
                    <div class="w-[56px] h-[56px] bg-white rounded-full"></div>
                </div>
            </div>

        </div>

        <!-- Black Translucent Bottom Bar (No Blur) -->
        <div class="w-full h-[100px] bg-black/60 flex justify-between items-center px-6 pointer-events-auto pb-safe">
            
            <!-- Gallery -->
            <div id="gallery-btn" class="w-11 h-11 rounded-full overflow-hidden cursor-pointer active:opacity-70 transition-opacity flex-shrink-0 border border-white/20 bg-zinc-800">
                <img id="gallery-thumbnail" src="" class="w-full h-full object-cover" alt="Gallery">
            </div>
            
            <!-- Modes -->
            <div class="flex items-center gap-6">
                <span class="text-white/90 text-[13px] font-semibold tracking-wider cursor-pointer drop-shadow-md">VIDEO</span>
                
                <div class="bg-black/40 rounded-full px-4 py-1.5 border border-white/10 cursor-pointer flex items-center justify-center shadow-inner" onclick="openSettings()">
                    <span class="text-[#ffd60a] text-[13px] font-semibold tracking-wider">PHOTO</span>
                </div>
            </div>
            
            <!-- Flip Camera -->
            <div class="w-11 h-11 rounded-full bg-black/40 border border-white/10 flex items-center justify-center text-white cursor-pointer active:bg-white/20 transition-colors" onclick="toggleCamera()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="17 1 21 5 17 9"></polyline>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                    <polyline points="7 23 3 19 7 15"></polyline>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                </svg>
            </div>

        </div>

    </div>

    <!-- AI Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/90 z-[200] hidden items-center justify-center p-4">
        <div class="bg-[#1c1c1d] w-full max-w-[90%] max-h-[90vh] flex flex-col rounded-3xl shadow-2xl border border-white/10 pointer-events-auto overflow-hidden">
            
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-white/10 flex justify-between items-center shrink-0">
                <h2 class="text-lg font-semibold text-[#ffd60a]">AI Magic Settings</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-white transition-colors p-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable) -->
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                <div class="mb-5">
                    <label class="block text-sm text-gray-400 mb-1.5 font-medium">API Key Gemini (AI Studio):</label>
                    <input type="password" id="setting-api-key" class="w-full bg-black/50 border border-white/20 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] transition-colors" placeholder="AIzaSy...">
                </div>

                <div class="mb-5">
                    <label class="block text-sm text-gray-400 mb-1.5 font-medium">Model Gemini:</label>
                    <input type="text" id="setting-ai-model" class="w-full bg-black/50 border border-white/20 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] transition-colors" placeholder="gemini-3.1-flash-image-preview">
                </div>

                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-1.5 font-medium">Delay transisi fade (detik):</label>
                    <input type="number" id="setting-delay" class="w-full bg-black/50 border border-white/20 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] transition-colors" min="0" step="0.5">
                </div>

                <!-- Prompt Manager Section -->
                <div class="border-t border-white/10 pt-5 mt-2">
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm text-[#ffd60a] font-medium">Prompt Rahasia (Aktif):</label>
                    </div>
                    
                    <textarea id="setting-prompt" class="w-full bg-black/50 border border-white/20 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] resize-none h-24 mb-3 transition-colors placeholder-gray-600" placeholder="Ketik prompt baru di sini..."></textarea>
                    
                    <button onclick="saveCurrentPrompt()" class="w-full bg-white/10 hover:bg-white/20 text-white font-medium rounded-xl py-2.5 mb-5 active:scale-[0.98] transition-all text-sm border border-white/10">
                        + Simpan ke Draft
                    </button>

                    <label class="block text-sm text-gray-400 mb-2 font-medium">Draft Prompt Tersimpan:</label>
                    <div id="prompt-list" class="flex flex-col gap-2 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                        <!-- List draft prompt akan di-render di sini via JS -->
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-6 border-t border-white/10 shrink-0">
                <button onclick="closeSettings()" class="w-full bg-[#ffd60a] text-black font-bold rounded-xl py-3.5 active:scale-[0.98] transition-transform touch-manipulation shadow-lg">Simpan & Tutup</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Gallery Modal -->
    <div id="gallery-modal" class="fixed inset-0 bg-black z-[100] hidden items-center justify-center cursor-pointer">
        <img id="gallery-generated" src="" class="absolute w-full h-full object-contain z-10" alt="Generated">
        <img id="gallery-original" src="" class="absolute w-full h-full object-contain z-20" alt="Original">
        
        <!-- Loading Dot Indicator di Pojok Kiri Bawah (Diperkecil & Warna Abu) -->
        <div id="preview-loading-dot" class="absolute bottom-8 left-8 w-1 h-1 bg-gray-400 rounded-full z-30 opacity-0 transition-opacity duration-300 pointer-events-none"></div>
    </div>

    <canvas id="photo-canvas" class="hidden"></canvas>

    <script>
        // --- PWA Initialization ---
        function initPWA() {
            // Encode manifest menggunakan direct link untuk icon
            const manifestContent = {
                name: "AI Magic Camera", short_name: "AICam", start_url: ".", display: "standalone",
                background_color: "#000000", theme_color: "#000000",
                icons: [{ src: "https://raw.githubusercontent.com/deyiksanjaya/AI-camera/refs/heads/main/icon-512.png", sizes: "512x512", type: "image/png" }]
            };
            
            const base64Manifest = btoa(JSON.stringify(manifestContent));
            
            const link = document.createElement('link'); 
            link.rel = 'manifest'; 
            link.href = 'data:application/manifest+json;base64,' + base64Manifest;
            document.head.appendChild(link);

            if ('serviceWorker' in navigator) {
                // Network First Strategy
                const swCode = `
                const CACHE_NAME = 'ai-magic-cam-v1';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => self.clients.claim());
                self.addEventListener('fetch', e => {
                    if (e.request.method !== 'GET') return;
                    e.respondWith(
                        fetch(e.request)
                        .then(res => {
                            const resClone = res.clone();
                            caches.open(CACHE_NAME).then(cache => cache.put(e.request, resClone));
                            return res;
                        })
                        .catch(() => caches.match(e.request))
                    );
                });
                `;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(e => console.error("SW Error:", e));
            }
        }
        initPWA();

        // --- Core Application Logic ---
        const videoElement = document.getElementById('camera-stream');
        const shutterBtn = document.getElementById('shutter-btn');
        const flashOverlay = document.getElementById('flash-overlay');
        const flashAutoText = document.getElementById('flash-auto-text');
        const galleryThumbnail = document.getElementById('gallery-thumbnail');
        const galleryModal = document.getElementById('gallery-modal');
        const galleryOriginal = document.getElementById('gallery-original');
        const galleryGenerated = document.getElementById('gallery-generated');
        const previewLoadingDot = document.getElementById('preview-loading-dot');
        
        // Settings Elements
        const settingsModal = document.getElementById('settings-modal');
        const settingApiKey = document.getElementById('setting-api-key');
        const settingAiModel = document.getElementById('setting-ai-model');
        const settingPrompt = document.getElementById('setting-prompt');
        const settingDelay = document.getElementById('setting-delay');
        const promptListContainer = document.getElementById('prompt-list');
        
        const canvas = document.getElementById('photo-canvas');
        const ctx = canvas.getContext('2d');

        let currentFacingMode = 'environment'; 
        let currentStream = null;
        let originalImageData = null;
        let generatedImageData = null;
        let isAiReady = false;
        
        // State preview: 'ORIGINAL', 'FADING', 'AI'
        let previewState = 'ORIGINAL'; 
        
        galleryThumbnail.src = `https://picsum.photos/200/200?random=${Math.floor(Math.random() * 1000)}`;

        // Load State
        let userApiKey = localStorage.getItem('gemini_api_key') || "";
        let aiModel = localStorage.getItem('ai_model') || "gemini-3.1-flash-image-preview";
        let aiPromptStr = localStorage.getItem('ai_prompt') || "change this card to two of spades with mainstream card design";
        let fadeDelaySec = parseFloat(localStorage.getItem('fade_delay')) || 2;
        let savedPrompts = JSON.parse(localStorage.getItem('saved_prompts') || '[]');

        // Initialize Settings Modal Values
        settingApiKey.value = userApiKey;
        settingAiModel.value = aiModel;
        settingPrompt.value = aiPromptStr;
        settingDelay.value = fadeDelaySec;

        // --- Camera Functions ---
        async function initCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: false 
                });
                videoElement.srcObject = stream;
                currentStream = stream;
                videoElement.play();
            } catch (err) {
                console.error("Kamera Error:", err);
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
                currentStream = null;
            }
        }

        function toggleCamera() {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            videoElement.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            initCamera();
        }

        // --- Settings & Prompt Manager Functions ---
        function renderPromptList() {
            promptListContainer.innerHTML = '';
            
            if (savedPrompts.length === 0) {
                promptListContainer.innerHTML = '<div class="text-xs text-gray-500 italic p-2 text-center">Belum ada draft tersimpan.</div>';
                return;
            }

            savedPrompts.forEach((prompt, index) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-black/40 border border-white/5 rounded-lg p-2.5 hover:bg-black/60 transition-colors group';
                
                const textSpan = document.createElement('span');
                textSpan.className = 'text-xs text-gray-300 truncate pr-2 cursor-pointer flex-1';
                textSpan.textContent = prompt;
                textSpan.title = prompt;
                textSpan.onclick = () => {
                    settingPrompt.value = prompt;
                };

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'text-gray-500 hover:text-red-400 p-1 rounded transition-colors';
                deleteBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                `;
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deletePrompt(index);
                };

                item.appendChild(textSpan);
                item.appendChild(deleteBtn);
                promptListContainer.appendChild(item);
            });
        }

        function saveCurrentPrompt() {
            const currentVal = settingPrompt.value.trim();
            if (currentVal && !savedPrompts.includes(currentVal)) {
                savedPrompts.unshift(currentVal); // Add to beginning
                localStorage.setItem('saved_prompts', JSON.stringify(savedPrompts));
                renderPromptList();
            }
        }

        function deletePrompt(index) {
            savedPrompts.splice(index, 1);
            localStorage.setItem('saved_prompts', JSON.stringify(savedPrompts));
            renderPromptList();
        }

        function openSettings() {
            renderPromptList();
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
        }

        function closeSettings() {
            userApiKey = settingApiKey.value.trim();
            aiModel = settingAiModel.value.trim() || "gemini-3.1-flash-image-preview";
            aiPromptStr = settingPrompt.value;
            fadeDelaySec = parseFloat(settingDelay.value) || 2;

            localStorage.setItem('gemini_api_key', userApiKey);
            localStorage.setItem('ai_model', aiModel);
            localStorage.setItem('ai_prompt', aiPromptStr);
            localStorage.setItem('fade_delay', fadeDelaySec);

            settingsModal.classList.remove('flex');
            settingsModal.classList.add('hidden');
        }

        // --- AI Generation ---
        async function generateAiImage(base64Data) {
            if (!userApiKey) return;
            isAiReady = false;
            
            // Tampilkan indikator 'A' saat proses AI dimulai
            flashAutoText.classList.remove('opacity-0');
            
            // Jika sedang buka galeri saat generate berjalan, perlihatkan dot abu-abunya
            if (!galleryModal.classList.contains('hidden')) {
                previewLoadingDot.classList.remove('opacity-0');
            }

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${userApiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: aiPromptStr }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                        generationConfig: { responseModalities: ["TEXT", "IMAGE"] } 
                    })
                });
                
                if (!response.ok) throw new Error("API Gagal");

                const result = await response.json();
                const imgBase = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                if(imgBase) {
                    generatedImageData = `data:image/png;base64,${imgBase}`;
                    isAiReady = true;
                    
                    // Sembunyikan indikator setelah selesai
                    flashAutoText.classList.add('opacity-0');
                    previewLoadingDot.classList.add('opacity-0');
                    
                    // Update image base di galeri (berguna jika galeri sedang terbuka saat itu juga)
                    galleryGenerated.src = generatedImageData;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                flashAutoText.classList.add('opacity-0');
                previewLoadingDot.classList.add('opacity-0');
            }
        }

        // --- Event Listeners ---
        shutterBtn.addEventListener('click', () => {
            if (videoElement.readyState >= 2) {
                flashOverlay.classList.remove('shutter-flash');
                void flashOverlay.offsetWidth;
                flashOverlay.classList.add('shutter-flash');

                const maxWidth = 800;
                let w = videoElement.videoWidth, h = videoElement.videoHeight;
                if (w > maxWidth) { h = Math.floor((h * maxWidth) / w); w = maxWidth; }

                canvas.width = w; canvas.height = h;
                ctx.save();
                if (currentFacingMode === 'user') { ctx.translate(w, 0); ctx.scale(-1, 1); }
                ctx.drawImage(videoElement, 0, 0, w, h);
                ctx.restore();
                
                originalImageData = canvas.toDataURL('image/jpeg', 0.6);
                galleryThumbnail.src = originalImageData;
                
                // Reset state untuk foto baru
                previewState = 'ORIGINAL';
                galleryOriginal.style.opacity = '1';
                galleryOriginal.style.pointerEvents = 'auto'; // Agar bisa di-tap
                
                flashAutoText.classList.remove('opacity-0');
                generateAiImage(originalImageData.split(',')[1]);
            }
        });

        document.getElementById('gallery-btn').addEventListener('click', () => {
            if (!originalImageData) return;
            
            // Matikan kamera agar hemat baterai/proses
            stopCamera();

            galleryOriginal.src = originalImageData;
            galleryGenerated.src = isAiReady ? generatedImageData : originalImageData; 
            
            // Atur tampilan berdasarkan state (apakah sudah pernah memudar/fade ke AI sebelumnya)
            if (previewState === 'AI') {
                galleryOriginal.style.opacity = '0';
                galleryOriginal.style.pointerEvents = 'none'; // Biarkan user "Save Image" AI dengan menahan layar
            } else {
                galleryOriginal.style.opacity = '1';
                galleryOriginal.style.pointerEvents = 'auto';
            }
            
            // Atur dot loading abu-abu
            if (!isAiReady && previewState !== 'AI') {
                previewLoadingDot.classList.remove('opacity-0');
            } else {
                previewLoadingDot.classList.add('opacity-0');
            }

            galleryModal.classList.remove('hidden');
            galleryModal.classList.add('flex', 'fade-in');
        });

        galleryModal.addEventListener('click', () => {
            if (previewState === 'ORIGINAL' && isAiReady) {
                // Proses memudar / transisi "ajaib"
                previewState = 'FADING';
                setTimeout(() => {
                    // Cek lagi untuk menghindari bug user double click
                    if (previewState === 'FADING') {
                        galleryOriginal.style.opacity = '0';
                        setTimeout(() => {
                            if (previewState === 'FADING' || previewState === 'AI') {
                                previewState = 'AI';
                                galleryOriginal.style.pointerEvents = 'none'; // Memastikan gambar asli tidak menghalangi menu Save
                                galleryThumbnail.src = generatedImageData;    // Thumbnail berubah jadi AI permanen
                            }
                        }, 1500); // 1.5s sesuai animasi di CSS
                    }
                }, fadeDelaySec * 1000);

            } else if (previewState === 'AI' || (previewState === 'ORIGINAL' && !isAiReady)) {
                // Tutup galeri jika gambar AI sudah ada, atau jika gambar belum selesai diproses
                galleryModal.classList.add('hidden');
                galleryModal.classList.remove('flex', 'fade-in');
                previewLoadingDot.classList.add('opacity-0');
                
                // Nyalakan ulang kamera
                initCamera();
                
            } else if (previewState === 'FADING') {
                // Jika user tap layar BERSAMAAN saat efek memudar sedang jalan, paksa ke akhir proses
                previewState = 'AI';
                galleryOriginal.style.opacity = '0';
                galleryOriginal.style.pointerEvents = 'none';
                galleryThumbnail.src = generatedImageData;
                
                galleryModal.classList.add('hidden');
                galleryModal.classList.remove('flex', 'fade-in');
                previewLoadingDot.classList.add('opacity-0');
                initCamera();
            }
        });

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
