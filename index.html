<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lucid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        video::-webkit-media-controls,
        video::-webkit-media-controls-enclosure,
        video::-webkit-media-controls-overlay-play-button,
        video::-webkit-media-controls-start-playback-button {
            display: none !important;
            -webkit-appearance: none !important;
        }
        video { pointer-events: none; }
        
        .shutter-flash { animation: flash 0.15s ease-out; }
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* Input fix for mobile */
        input, textarea, select {
            font-size: 16px !important;
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        /* Custom Scrollbar for Settings */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3); 
        }

        /* Prevent default touch actions on gallery for custom zoom */
        #gallery-modal {
            touch-action: none;
        }
        
        /* Custom Select Arrow */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2rem !important;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-white select-none bg-black">

    <!-- Video Stream Fullscreen -->
    <video id="camera-stream" autoplay playsinline muted class="fixed inset-0 w-full h-full object-cover z-0"></video>
    
    <!-- Flash Overlay -->
    <div id="flash-overlay" class="fixed inset-0 bg-black z-20 opacity-0 pointer-events-none"></div>

    <!-- Notification Banner (Fallback) -->
    <div id="notification-banner" class="fixed top-[-100px] left-1/2 -translate-x-1/2 bg-[#1c1c1d]/90 text-white px-5 py-3 rounded-full flex items-center gap-3 shadow-2xl transition-all duration-500 ease-out z-[150] pointer-events-none border border-white/10 w-max max-w-[90%]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffd60a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span id="notification-text" class="text-[14px] font-semibold tracking-wide truncate">Tersimpan di Galeri</span>
    </div>

    <!-- Top Solid Translucent Background -->
    <div class="fixed top-0 left-0 w-full h-[75px] bg-black/60 pointer-events-none z-0"></div>

    <!-- Top Right Controls -->
    <div class="fixed top-[80px] right-4 bg-black/50 rounded-full px-3.5 py-2 flex items-center gap-4 z-10 border border-white/10">
        <!-- Moon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <!-- Flash A -->
        <div class="relative flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            <span id="flash-auto-text" class="absolute -right-1 -bottom-1 text-[9px] font-bold text-white drop-shadow-[0_1px_2px_rgba(0,0,0,1)] leading-none tracking-tighter transition-opacity duration-300">A</span>
        </div>
        <!-- Grid Dots -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
            <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            <circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
        </svg>
    </div>

    <!-- Bottom Controls Container -->
    <div class="fixed bottom-0 left-0 w-full z-10 flex flex-col pointer-events-none">
        
        <!-- Floating Elements Area -->
        <div class="w-full flex flex-col items-center pb-4">
            
            <!-- Zoom Controls -->
            <div class="flex items-center justify-center gap-5 mb-5 pointer-events-auto">
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer hover:text-[#ffd60a] transition-colors">0.5</span>
                
                <div class="w-9 h-9 bg-[#1c1c1d]/80 rounded-full flex items-center justify-center border border-white/10 cursor-pointer shadow-lg backdrop-blur-md">
                    <span class="text-[#ffd60a] text-[13px] font-semibold">1x</span>
                </div>
                
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer hover:text-[#ffd60a] transition-colors">2</span>
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer hover:text-[#ffd60a] transition-colors">4</span>
                <span class="text-[13px] font-medium text-white/95 drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)] cursor-pointer hover:text-[#ffd60a] transition-colors">8</span>
            </div>

            <!-- Shutter Button -->
            <div class="flex justify-center pointer-events-auto">
                <div id="shutter-btn" class="w-[70px] h-[70px] rounded-full border-[3px] border-white/90 flex items-center justify-center cursor-pointer active:scale-95 transition-transform bg-transparent">
                    <div class="w-[56px] h-[56px] bg-white rounded-full shadow-[0_0_15px_rgba(255,255,255,0.4)]"></div>
                </div>
            </div>

        </div>

        <!-- Black Translucent Bottom Bar -->
        <div class="w-full h-[100px] bg-black/60 flex justify-between items-center px-6 pointer-events-auto pb-safe">
            
            <!-- Gallery -->
            <div id="gallery-btn" class="w-11 h-11 rounded-full overflow-hidden cursor-pointer active:scale-95 transition-transform flex-shrink-0 border border-white/20 bg-zinc-800 shadow-lg">
                <img id="gallery-thumbnail" src="" class="w-full h-full object-cover" alt="Gallery">
            </div>
            
            <!-- Modes -->
            <div class="flex items-center gap-1 bg-black/40 backdrop-blur-md rounded-full px-2 py-1.5 border border-white/10 shadow-lg">
                <span class="px-4 py-1.5 rounded-full text-white/70 text-[13px] font-semibold tracking-wider cursor-pointer hover:text-white transition-colors">VIDEO</span>
                
                <div class="bg-black/60 rounded-full px-4 py-1.5 border border-white/10 cursor-pointer flex items-center justify-center shadow-inner" onclick="openSettings()">
                    <span class="text-[#ffd60a] text-[13px] font-semibold tracking-wider">PHOTO</span>
                </div>
            </div>
            
            <!-- Flip Camera -->
            <div class="w-11 h-11 rounded-full bg-black/40 border border-white/10 flex items-center justify-center text-white cursor-pointer active:bg-white/20 active:scale-95 transition-all" onclick="toggleCamera()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="17 1 21 5 17 9"></polyline>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                    <polyline points="7 23 3 19 7 15"></polyline>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                </svg>
            </div>

        </div>

    </div>

    <!-- AI Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[200] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-[#1c1c1d] w-full max-w-[95%] sm:max-w-[400px] max-h-[85vh] flex flex-col rounded-3xl shadow-2xl border border-white/10 pointer-events-auto overflow-hidden transform scale-95 transition-transform duration-300" id="settings-container">
            
            <!-- Modal Header -->
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center shrink-0 bg-gradient-to-b from-white/5 to-transparent">
                <h2 class="text-lg font-bold text-white tracking-wide flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffd60a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12c-2.75 0-5.25-2.5-6-5-1 4-4 6-7 6 3 0 6 2 7 6 .75-2.5 3.25-5 6-5z"></path>
                        <path d="M14 4c-1 0-2-1-2.5-2-.5 1-1.5 2-2.5 2 1 0 2 1 2.5 2 .5-1 1.5-2 2.5-2z"></path>
                    </svg>
                    Settings
                </h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full p-2 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable) -->
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-7">
                
                <!-- Section: Configuration -->
                <div class="space-y-4">
                    <h3 class="text-[11px] font-bold text-gray-500 uppercase tracking-widest pl-1">Configuration</h3>
                    
                    <div>
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Google API Key</label>
                        <input type="password" id="setting-google-api-key" class="w-full bg-black/40 border border-white/10 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] focus:bg-black/60 transition-colors placeholder-gray-600" placeholder="Enter AI Studio key...">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Google AI Model</label>
                        <input type="text" id="setting-google-model" class="w-full bg-black/40 border border-white/10 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] focus:bg-black/60 transition-colors placeholder-gray-600" placeholder="gemini-3.1-flash-image-preview">
                    </div>
                </div>

                <!-- Section: Transition -->
                <div class="space-y-4 pt-5 border-t border-white/5">
                    <h3 class="text-[11px] font-bold text-gray-500 uppercase tracking-widest pl-1">Transition</h3>
                    
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="block text-sm text-gray-300 mb-2 font-medium">Trigger</label>
                            <select id="setting-trigger" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a] focus:bg-black/60 transition-colors appearance-none">
                                <option value="tap">Tap</option>
                                <option value="swipe-up">Swipe Up</option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm text-gray-300 mb-2 font-medium">Effect</label>
                            <select id="setting-transition" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a] focus:bg-black/60 transition-colors appearance-none">
                                <option value="fade">Fade</option>
                                <option value="none">Instant</option>
                            </select>
                        </div>
                        <div class="flex-[0.8]">
                            <label class="block text-sm text-gray-300 mb-2 font-medium text-center">Delay(s)</label>
                            <input type="number" id="setting-delay" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a] focus:bg-black/60 transition-colors text-center" min="0" step="0.1">
                        </div>
                    </div>
                </div>

                <!-- Section: Prompts -->
                <div class="space-y-4 pt-5 border-t border-white/5">
                    <div class="flex justify-between items-center pl-1">
                        <h3 class="text-[11px] font-bold text-[#ffd60a] uppercase tracking-widest">AI Prompt</h3>
                    </div>
                    
                    <textarea id="setting-prompt" class="w-full bg-black/40 border border-white/10 rounded-xl p-3.5 text-sm text-white focus:outline-none focus:border-[#ffd60a] focus:bg-black/60 resize-none h-28 transition-colors placeholder-gray-600 leading-relaxed" placeholder="Type your magic prompt here..."></textarea>
                    
                    <button onclick="saveCurrentPrompt()" class="w-full flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 text-white font-medium rounded-xl py-3 active:scale-[0.98] transition-all text-sm border border-white/10">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Save as Draft
                    </button>

                    <div class="pt-2">
                        <label class="block text-sm text-gray-400 mb-3 font-medium pl-1">Saved Prompts</label>
                        <div id="prompt-list" class="flex flex-col gap-2.5 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                            <!-- List draft prompt rendered here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-6 border-t border-white/5 shrink-0 bg-black/20">
                <button onclick="closeSettings()" class="w-full bg-[#ffd60a] hover:bg-[#e6c100] text-black font-bold rounded-xl py-3.5 active:scale-[0.98] transition-all touch-manipulation shadow-[0_4px_15px_rgba(255,214,10,0.3)]">Save & Close</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Gallery Modal dengan Shape Shift Logic -->
    <div id="gallery-modal" class="fixed inset-0 z-[100] hidden items-center justify-center cursor-pointer touch-none bg-transparent">
        
        <!-- Animasi Shape-Shift berjalan di div ini -->
        <div id="gallery-anim-wrapper" class="absolute bg-black overflow-hidden flex items-center justify-center origin-center">
            
            <!-- Zoom Container -->
            <div id="zoom-container" class="relative w-full h-full flex items-center justify-center origin-center">
                <img id="gallery-generated" src="" class="absolute w-full h-full object-contain z-10 pointer-events-none" alt="Generated">
                <img id="gallery-original" src="" class="absolute w-full h-full object-contain z-20 pointer-events-none" alt="Original">
            </div>

        </div>

        <!-- Loading Dot Indicator (Tanpa Animasi) -->
        <div id="preview-loading-dot" class="absolute bottom-12 right-8 w-1.5 h-1.5 bg-gray-400/80 rounded-full z-30 opacity-0 transition-opacity duration-300 pointer-events-none"></div>
    </div>

    <canvas id="photo-canvas" class="hidden"></canvas>

    <script>
        // --- PWA Initialization ---
        function initPWA() {
            const manifestContent = {
                name: "Lucid", short_name: "Lucid", start_url: ".", display: "standalone",
                background_color: "#000000", theme_color: "#000000",
                icons: [{ src: "icon-512.png", sizes: "512x512", type: "image/png" }]
            };

            const manifestBlob = new Blob([JSON.stringify(manifestContent)], {type: 'application/json'});
            const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
            document.head.appendChild(link);

            if ('serviceWorker' in navigator) {
                const swCode = `
                const CACHE_NAME = 'ai-magic-cam-v1';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => self.clients.claim());
                self.addEventListener('fetch', e => {
                    if (e.request.method !== 'GET') return;
                    e.respondWith(
                        fetch(e.request).then(res => {
                            const resClone = res.clone();
                            caches.open(CACHE_NAME).then(cache => cache.put(e.request, resClone));
                            return res;
                        }).catch(() => caches.match(e.request))
                    );
                });
                `;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(e => console.error("SW Error:", e));
            }
        }
        initPWA();

        // --- Core Application Logic ---
        const videoElement = document.getElementById('camera-stream');
        const shutterBtn = document.getElementById('shutter-btn');
        const flashOverlay = document.getElementById('flash-overlay');
        const flashAutoText = document.getElementById('flash-auto-text');
        
        const notificationBanner = document.getElementById('notification-banner');
        const notificationText = document.getElementById('notification-text');
        let notificationTimeout;

        const galleryBtn = document.getElementById('gallery-btn');
        const galleryThumbnail = document.getElementById('gallery-thumbnail');
        const galleryModal = document.getElementById('gallery-modal');
        const galleryAnimWrapper = document.getElementById('gallery-anim-wrapper');
        const zoomContainer = document.getElementById('zoom-container');
        const galleryOriginal = document.getElementById('gallery-original');
        const galleryGenerated = document.getElementById('gallery-generated');
        const previewLoadingDot = document.getElementById('preview-loading-dot');
        
        // Settings Elements
        const settingsModal = document.getElementById('settings-modal');
        const settingsContainer = document.getElementById('settings-container');
        
        const settingGoogleApiKey = document.getElementById('setting-google-api-key');
        const settingGoogleModel = document.getElementById('setting-google-model');
        
        const settingPrompt = document.getElementById('setting-prompt');
        const settingDelay = document.getElementById('setting-delay');
        const settingTransition = document.getElementById('setting-transition');
        const settingTrigger = document.getElementById('setting-trigger');
        const promptListContainer = document.getElementById('prompt-list');
        
        const canvas = document.getElementById('photo-canvas');
        const ctx = canvas.getContext('2d');

        let currentFacingMode = 'environment'; 
        let currentStream = null;
        let originalImageData = null;
        let generatedImageData = null;
        let isAiReady = false;
        
        // State preview: 'ORIGINAL', 'FADING', 'AI'
        let previewState = 'ORIGINAL'; 
        
        galleryThumbnail.src = `https://picsum.photos/200/200?random=${Math.floor(Math.random() * 1000)}`;

        // --- Migrasi data lama (jika ada) ke memori Google API ---
        let oldGeminiKey = localStorage.getItem('gemini_api_key');
        if (oldGeminiKey && !localStorage.getItem('google_api_key')) {
            localStorage.setItem('google_api_key', oldGeminiKey);
            localStorage.removeItem('gemini_api_key'); 
        }
        let oldGeminiModel = localStorage.getItem('ai_model');
        if (oldGeminiModel && !localStorage.getItem('google_ai_model')) {
            localStorage.setItem('google_ai_model', oldGeminiModel);
            localStorage.removeItem('ai_model');
        }

        // --- Load State ---
        let googleApiKey = localStorage.getItem('google_api_key') || "";
        let googleAiModel = localStorage.getItem('google_ai_model') || "gemini-3.1-flash-image-preview";
        
        let aiPromptStr = localStorage.getItem('ai_prompt') || "change this card to two of spades";
        
        let storedDelay = localStorage.getItem('fade_delay');
        let fadeDelaySec = storedDelay !== null ? parseFloat(storedDelay) : 2;
        if (isNaN(fadeDelaySec)) fadeDelaySec = 2;

        let transitionType = localStorage.getItem('transition_type') || "fade";
        let triggerMethod = localStorage.getItem('trigger_method') || "tap";
        let savedPrompts = JSON.parse(localStorage.getItem('saved_prompts') || '[]');

        // Initialize Settings Modal Values
        settingGoogleApiKey.value = googleApiKey;
        settingGoogleModel.value = googleAiModel;
        
        settingPrompt.value = aiPromptStr;
        settingDelay.value = fadeDelaySec;
        settingTransition.value = transitionType;
        settingTrigger.value = triggerMethod;

        // --- Camera Functions ---
        async function initCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: false 
                });
                videoElement.srcObject = stream;
                currentStream = stream;
                videoElement.play();
            } catch (err) {
                console.error("Camera Error:", err);
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
                currentStream = null;
            }
        }

        function toggleCamera() {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            videoElement.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            initCamera();
        }

        // --- Notification Logic ---
        function showNotification(message) {
            notificationText.textContent = message;
            notificationBanner.style.top = '40px'; 
            
            clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => {
                notificationBanner.style.top = '-100px'; 
            }, 2500);
        }

        // --- Settings & Prompt Manager Functions ---
        function renderPromptList() {
            promptListContainer.innerHTML = '';
            if (savedPrompts.length === 0) {
                promptListContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-6 border border-dashed border-white/10 rounded-xl bg-black/20">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <span class="text-xs text-gray-500 font-medium">Belum ada prompt tersimpan</span>
                    </div>`;
                return;
            }

            savedPrompts.forEach((prompt, index) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-black/40 border border-white/5 rounded-xl p-3 hover:bg-black/60 transition-colors group';
                
                const textSpan = document.createElement('span');
                textSpan.className = 'text-xs text-gray-300 truncate pr-3 cursor-pointer flex-1 leading-relaxed';
                textSpan.textContent = prompt;
                textSpan.onclick = () => { settingPrompt.value = prompt; };

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'text-gray-500 hover:text-red-400 p-1.5 rounded-lg hover:bg-white/5 transition-all';
                deleteBtn.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                `;
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deletePrompt(index);
                };

                item.appendChild(textSpan);
                item.appendChild(deleteBtn);
                promptListContainer.appendChild(item);
            });
        }

        function saveCurrentPrompt() {
            const currentVal = settingPrompt.value.trim();
            if (currentVal && !savedPrompts.includes(currentVal)) {
                savedPrompts.unshift(currentVal);
                localStorage.setItem('saved_prompts', JSON.stringify(savedPrompts));
                renderPromptList();
            }
        }

        function deletePrompt(index) {
            savedPrompts.splice(index, 1);
            localStorage.setItem('saved_prompts', JSON.stringify(savedPrompts));
            renderPromptList();
        }

        function openSettings() {
            renderPromptList();
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
            
            setTimeout(() => {
                settingsModal.classList.remove('opacity-0');
                settingsContainer.classList.remove('scale-95');
                settingsContainer.classList.add('scale-100');
            }, 10);
        }

        function closeSettings() {
            googleApiKey = settingGoogleApiKey.value.trim();
            googleAiModel = settingGoogleModel.value.trim() || "gemini-3.1-flash-image-preview";
            
            aiPromptStr = settingPrompt.value.trim() || "change this card to two of spades";
            triggerMethod = settingTrigger.value;
            
            let parsedDelay = parseFloat(settingDelay.value);
            fadeDelaySec = isNaN(parsedDelay) ? 2 : Math.max(0, parsedDelay);
            
            transitionType = settingTransition.value;

            // Simpan semua ke LocalStorage
            localStorage.setItem('google_api_key', googleApiKey);
            localStorage.setItem('google_ai_model', googleAiModel);
            
            localStorage.setItem('ai_prompt', aiPromptStr);
            localStorage.setItem('fade_delay', fadeDelaySec);
            localStorage.setItem('transition_type', transitionType);
            localStorage.setItem('trigger_method', triggerMethod);

            settingsModal.classList.add('opacity-0');
            settingsContainer.classList.remove('scale-100');
            settingsContainer.classList.add('scale-95');
            
            setTimeout(() => {
                settingsModal.classList.remove('flex');
                settingsModal.classList.add('hidden');
            }, 300);
        }

        // --- AI Generation ---
        async function generateAiImage(base64Data) {
            const activeKey = googleApiKey;
            const activeModel = googleAiModel;

            if (!activeKey) return;
            isAiReady = false;
            
            flashAutoText.classList.remove('opacity-0');
            if (!galleryModal.classList.contains('hidden')) {
                previewLoadingDot.classList.remove('opacity-0');
            }

            const hiddenInstruction = ", photo realistic, keep other details exactly the same, use standard face design for playing card";
            const finalPrompt = aiPromptStr + hiddenInstruction;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${activeKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: finalPrompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                        generationConfig: { responseModalities: ["TEXT", "IMAGE"] } 
                    })
                });
                
                if (!response.ok) throw new Error("Google API Failed");

                const result = await response.json();
                const imgBase = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                
                if(imgBase) {
                    generatedImageData = `data:image/png;base64,${imgBase}`;
                    isAiReady = true;
                    flashAutoText.classList.add('opacity-0');
                    previewLoadingDot.classList.add('opacity-0');
                    galleryGenerated.src = generatedImageData;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                flashAutoText.classList.add('opacity-0');
                previewLoadingDot.classList.add('opacity-0');
            }
        }

        // --- Event Listeners: Shutter & Gallery Button ---
        shutterBtn.addEventListener('click', () => {
            if (videoElement.readyState >= 2) {
                flashOverlay.classList.remove('shutter-flash');
                void flashOverlay.offsetWidth;
                flashOverlay.classList.add('shutter-flash');

                const maxWidth = 800;
                let w = videoElement.videoWidth, h = videoElement.videoHeight;
                if (w > maxWidth) { h = Math.floor((h * maxWidth) / w); w = maxWidth; }

                canvas.width = w; canvas.height = h;
                ctx.save();
                if (currentFacingMode === 'user') { ctx.translate(w, 0); ctx.scale(-1, 1); }
                ctx.drawImage(videoElement, 0, 0, w, h);
                ctx.restore();
                
                originalImageData = canvas.toDataURL('image/jpeg', 0.6);
                galleryThumbnail.src = originalImageData;
                
                previewState = 'ORIGINAL';
                galleryOriginal.style.transition = 'none';
                galleryOriginal.style.opacity = '1';
                
                flashAutoText.classList.remove('opacity-0');
                generateAiImage(originalImageData.split(',')[1]);
            }
        });

        // Event Listener untuk BUKA Gallery Animasi "Shape Shift"
        galleryBtn.addEventListener('click', () => {
            if (!originalImageData) return;
            
            stopCamera();
            galleryOriginal.src = originalImageData;
            galleryGenerated.src = isAiReady ? generatedImageData : originalImageData; 
            
            if (previewState === 'AI') {
                galleryOriginal.style.transition = 'none';
                galleryOriginal.style.opacity = '0';
            } else {
                galleryOriginal.style.transition = 'none';
                galleryOriginal.style.opacity = '1';
            }
            
            if (!isAiReady && previewState !== 'AI') {
                previewLoadingDot.classList.remove('opacity-0');
            } else {
                previewLoadingDot.classList.add('opacity-0');
            }

            resetZoom();

            galleryModal.classList.remove('hidden');
            galleryModal.classList.add('flex');

            const btnRect = galleryBtn.getBoundingClientRect();
            galleryAnimWrapper.style.transition = 'none';
            galleryAnimWrapper.style.left = `${btnRect.left}px`;
            galleryAnimWrapper.style.top = `${btnRect.top}px`;
            galleryAnimWrapper.style.width = `${btnRect.width}px`;
            galleryAnimWrapper.style.height = `${btnRect.height}px`;
            galleryAnimWrapper.style.borderRadius = '50%';
            galleryModal.style.backgroundColor = 'transparent';

            void galleryAnimWrapper.offsetWidth;

            galleryAnimWrapper.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            galleryModal.style.transition = 'background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            
            galleryAnimWrapper.style.left = '0px';
            galleryAnimWrapper.style.top = '0px';
            galleryAnimWrapper.style.width = '100%';
            galleryAnimWrapper.style.height = '100%';
            galleryAnimWrapper.style.borderRadius = '0px';
            galleryModal.style.backgroundColor = 'rgba(0,0,0,1)';
        });

        // --- Logic Native Share dengan Long Press ---
        async function shareImageToDevice(dataUrl) {
            if (!dataUrl) return;

            // Berikan efek haptic feedback jika didukung (untuk meyakinkan pesulap)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }

            try {
                // Konversi Base64 ke Blob untuk Web Share API
                const res = await fetch(dataUrl);
                const blob = await res.blob();
                
                const now = new Date();
                const timeStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}_${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}${now.getSeconds().toString().padStart(2, '0')}`;
                const filename = `Lucid_${timeStr}.jpg`;
                const file = new File([blob], filename, { type: 'image/jpeg' });

                // Cek dukungan Web Share API & kemampuannya membagikan file
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Lucid',
                    });
                } else {
                    // Fallback Download Langsung jika Web Share tidak didukung
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showNotification("Foto tersimpan di perangkat");
                }
            } catch (error) {
                console.error("Share failed/cancelled:", error);
                // Abaikan jika user menekan tombol batal di share sheet
            }
        }

        // --- Logic Gestures (Tap, Zoom, Swipe, dan Long Press) ---
        let scale = 1;
        let startScale = 1; 
        let posX = 0, posY = 0;
        let swipeDeltaY = 0; 
        let startDistance = 0;
        let startPanX = 0, startPanY = 0;
        let isPointerDown = false;
        let pointerStart = {x: 0, y: 0};
        let pointers = [];
        let maxPointers = 0; 
        
        let longPressTimer;
        let isLongPressTriggered = false;

        function updateZoomTransform() {
            if (scale === 1 && swipeDeltaY === 0) { posX = 0; posY = 0; }
            zoomContainer.style.transform = `translate(${posX}px, ${posY + swipeDeltaY}px) scale(${scale})`;
        }

        function resetZoom() {
            scale = 1; startScale = 1; 
            posX = 0; posY = 0; swipeDeltaY = 0;
            updateZoomTransform();
        }

        galleryModal.addEventListener('pointerdown', (e) => {
            e.preventDefault(); 
            pointers.push(e);
            
            if (pointers.length > maxPointers) maxPointers = pointers.length;

            if (pointers.length === 1) {
                isPointerDown = true;
                pointerStart = {x: e.clientX, y: e.clientY};
                swipeDeltaY = 0;
                isLongPressTriggered = false;
                
                // Start Long Press Timer (300ms) untuk Share
                clearTimeout(longPressTimer);
                longPressTimer = setTimeout(() => {
                    isLongPressTriggered = true;
                    // Ambil gambar yang saat ini sedang terlihat
                    const currentDataUrl = (previewState === 'AI' && generatedImageData) ? generatedImageData : originalImageData;
                    shareImageToDevice(currentDataUrl);
                }, 300);
                
                if (scale > 1) {
                    startPanX = e.clientX - posX;
                    startPanY = e.clientY - posY;
                }
            } else if (pointers.length === 2) {
                clearTimeout(longPressTimer); // Batalkan timer jika mulai nge-zoom
                startDistance = Math.hypot(
                    pointers[0].clientX - pointers[1].clientX,
                    pointers[0].clientY - pointers[1].clientY
                );
                startScale = scale; 
            }
        });

        galleryModal.addEventListener('pointermove', (e) => {
            const index = pointers.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) pointers[index] = e;

            if (pointers.length === 2) {
                const currentDistance = Math.hypot(
                    pointers[0].clientX - pointers[1].clientX,
                    pointers[0].clientY - pointers[1].clientY
                );
                
                if (startDistance > 0) {
                    const zoomDelta = currentDistance / startDistance;
                    scale = Math.max(1, startScale * zoomDelta);
                    scale = Math.min(scale, 5); 
                    swipeDeltaY = 0; 
                    updateZoomTransform();
                }
            } else if (pointers.length === 1 && isPointerDown) {
                // Cancel long press jika user menggeser jari terlalu jauh (swipe)
                const moveDist = Math.hypot(e.clientX - pointerStart.x, e.clientY - pointerStart.y);
                if (moveDist > 10) {
                    clearTimeout(longPressTimer);
                }

                if (scale > 1) {
                    let newPosX = e.clientX - startPanX;
                    let newPosY = e.clientY - startPanY;

                    const maxPosX = (window.innerWidth * scale) / 2;
                    const maxPosY = (window.innerHeight * scale) / 2;

                    posX = Math.max(-maxPosX, Math.min(maxPosX, newPosX));
                    posY = Math.max(-maxPosY, Math.min(maxPosY, newPosY));

                    updateZoomTransform();
                } else if (maxPointers === 1 && scale === 1) {
                    const deltaY = e.clientY - pointerStart.y;
                    const absDeltaX = Math.abs(e.clientX - pointerStart.x);
                    
                    if (deltaY > 0 && deltaY > absDeltaX) { // SWIPE DOWN (Visual Feedback Close)
                        swipeDeltaY = deltaY * 0.4; 
                        updateZoomTransform();
                        galleryModal.style.backgroundColor = `rgba(0,0,0,${Math.max(0.4, 1 - (deltaY / 400))})`;
                    } else {
                        swipeDeltaY = 0;
                        updateZoomTransform();
                    }
                }
            }
        });

        const handlePointerUp = (e) => {
            clearTimeout(longPressTimer); // Pastikan timer dibatalkan saat jari diangkat

            const index = pointers.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) pointers.splice(index, 1);

            if (pointers.length < 2) {
                startDistance = 0;
                if (pointers.length === 1 && scale > 1) {
                    startPanX = pointers[0].clientX - posX;
                    startPanY = pointers[0].clientY - posY;
                }
            }
            
            if (pointers.length === 0) {
                isPointerDown = false;
                
                // Jika menu share (long press) baru saja terbuka, batalkan trigger Tap/Swipe
                if (isLongPressTriggered) {
                    isLongPressTriggered = false;
                    maxPointers = 0;
                    return; 
                }
                
                const deltaY = e.clientY - pointerStart.y;
                const deltaX = e.clientX - pointerStart.x;
                const absDeltaY = Math.abs(deltaY);
                const absDeltaX = Math.abs(deltaX);
                
                // Deteksi murni TAP
                const isTapGesture = absDeltaY < 10 && absDeltaX < 10;
                // Deteksi Swipe Down (tutup gallery)
                const isSwipeDown = deltaY > 80 && deltaY > absDeltaX * 1.5;
                // Deteksi Swipe Up (opsi trigger)
                const isSwipeUp = deltaY < -80 && absDeltaY > absDeltaX * 1.5;

                if (maxPointers === 1 && scale === 1) {
                    if (isSwipeDown) {
                        swipeDeltaY = 0;
                        closeGallery();
                    } else if (isSwipeUp && triggerMethod === 'swipe-up') {
                        swipeDeltaY = 0;
                        updateZoomTransform();
                        galleryModal.style.backgroundColor = 'rgba(0,0,0,1)';
                        if (previewState === 'ORIGINAL' && isAiReady) {
                            startTransition();
                        }
                    } else {
                        swipeDeltaY = 0;
                        updateZoomTransform();
                        galleryModal.style.backgroundColor = 'rgba(0,0,0,1)';
                        
                        if (isTapGesture) {
                            handleGalleryTap();
                        }
                    }
                } else if (maxPointers === 1 && scale > 1) {
                    // JIKA LAGI ZOOM IN
                    if (isSwipeUp && triggerMethod === 'swipe-up') {
                        if (previewState === 'ORIGINAL' && isAiReady) {
                            startTransition();
                        }
                    } else if (isTapGesture) {
                        handleGalleryTap();
                    }
                } else {
                    swipeDeltaY = 0;
                    updateZoomTransform();
                }

                if (scale <= 1.05) {
                    resetZoom();
                }
                
                maxPointers = 0; 
            }
        };

        galleryModal.addEventListener('pointerup', handlePointerUp);
        galleryModal.addEventListener('pointercancel', handlePointerUp);
        galleryModal.addEventListener('pointerleave', handlePointerUp);


        // --- Fungsi Tutup Gallery ---
        function closeGallery() {
            swipeDeltaY = 0;
            updateZoomTransform();
            
            const btnRect = galleryBtn.getBoundingClientRect();
            
            galleryAnimWrapper.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            galleryModal.style.transition = 'background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            
            galleryAnimWrapper.style.left = `${btnRect.left}px`;
            galleryAnimWrapper.style.top = `${btnRect.top}px`;
            galleryAnimWrapper.style.width = `${btnRect.width}px`;
            galleryAnimWrapper.style.height = `${btnRect.height}px`;
            galleryAnimWrapper.style.borderRadius = '50%';
            galleryModal.style.backgroundColor = 'transparent';
            previewLoadingDot.classList.add('opacity-0');

            setTimeout(() => {
                galleryModal.classList.add('hidden');
                galleryModal.classList.remove('flex');
                initCamera();
            }, 400); 
        }

        // --- Fungsi Eksekusi Transisi ---
        function startTransition() {
            previewState = 'FADING';
            setTimeout(() => {
                if (previewState === 'FADING') {
                    galleryOriginal.style.transition = transitionType === 'fade' ? 'opacity 1.5s ease-in-out' : 'none';
                    galleryOriginal.style.opacity = '0';
                    
                    setTimeout(() => {
                        if (previewState === 'FADING' || previewState === 'AI') {
                            previewState = 'AI';
                            galleryThumbnail.src = generatedImageData;
                        }
                    }, transitionType === 'fade' ? 1500 : 50);
                }
            }, fadeDelaySec * 1000);
        }

        // --- Fungsi Handle Tap ---
        function handleGalleryTap() {
            if (previewState === 'ORIGINAL') {
                if (isAiReady && triggerMethod === 'tap') {
                    startTransition();
                }
            } else if (previewState === 'FADING') {
                previewState = 'AI';
                galleryOriginal.style.transition = 'none';
                galleryOriginal.style.opacity = '0';
                galleryThumbnail.src = generatedImageData;
            } 
        }

        window.addEventListener('load', initCamera);
    </script>
</body>
