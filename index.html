<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Magic Camera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        video::-webkit-media-controls,
        video::-webkit-media-controls-enclosure,
        video::-webkit-media-controls-overlay-play-button,
        video::-webkit-media-controls-start-playback-button {
            display: none !important;
            -webkit-appearance: none !important;
        }
        video { pointer-events: none; }
        .glass-ui {
            background: rgba(28, 28, 29, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .shutter-flash { animation: flash 0.15s ease-out; }
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        #gallery-original { transition: opacity 1.5s ease-in-out; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        /* Debug Console Styles */
        #debug-console-container {
            font-family: monospace;
            font-size: 10px;
        }
        .debug-msg { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px; margin-bottom: 2px; word-break: break-all; }
        .debug-error { color: #ff6b6b; }
        .debug-log { color: #4cd137; }
        
        /* Input fix for mobile */
        input, textarea {
            font-size: 16px !important; /* Mencegah auto-zoom di iOS */
            user-select: text !important;
            -webkit-user-select: text !important;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-white select-none bg-black">

    <!-- Video Stream Fullscreen -->
    <video id="camera-stream" autoplay playsinline muted class="fixed inset-0 w-full h-full object-cover z-0"></video>
    <div id="flash-overlay" class="fixed inset-0 bg-white z-20 opacity-0 pointer-events-none"></div>

    <!-- Notification Banner -->
    <div id="notification-banner" class="fixed top-[-100px] left-1/2 -translate-x-1/2 bg-[#1c1c1d]/90 backdrop-blur-xl text-white px-5 py-3 rounded-full flex items-center gap-3 shadow-2xl transition-all duration-500 ease-out z-[150] pointer-events-none border border-white/10 w-max max-w-[90%]">
        <span id="notification-text" class="text-[14px] font-semibold tracking-wide truncate">Memproses...</span>
    </div>

    <!-- Debug Toggle Button -->
    <button id="debug-toggle-btn" onclick="toggleDebug()" class="fixed top-14 left-4 z-[160] w-8 h-8 bg-red-600/80 rounded-full border border-white/30 text-white font-bold flex items-center justify-center text-sm shadow-lg pointer-events-auto">
        !
    </button>

    <!-- Floating Debug Console -->
    <div id="debug-console-container" class="fixed top-24 left-4 right-4 h-[25vh] bg-black/80 border border-white/20 rounded-lg p-2 overflow-y-auto z-[155] flex flex-col gap-1 backdrop-blur-md pointer-events-auto transition-opacity">
        <div class="text-xs font-bold text-yellow-400 border-b border-yellow-400/30 pb-1 mb-1 sticky top-0 bg-black/90 flex justify-between">
            <span>Debug Console</span>
            <span onclick="clearDebug()" class="text-gray-400 cursor-pointer">Clear</span>
        </div>
        <div id="debug-output" class="flex-1 overflow-y-auto pb-2"></div>
    </div>

    <!-- Top Bar -->
    <div class="fixed top-0 left-0 w-full h-[12%] flex-shrink-0 z-10 bg-black/80 pt-safe">
        <div class="absolute top-1/2 -translate-y-1/2 right-4 glass-ui rounded-full px-3 py-1.5 flex items-center gap-3.5 mt-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <div class="relative flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                <span id="flash-auto-text" class="absolute -right-2 -bottom-1 text-[9px] font-bold bg-[#1c1c1d] text-white rounded-full px-[3px] leading-none tracking-tighter transition-opacity duration-300">A</span>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12h.01M12 12h.01M16 12h.01" stroke-width="2.5" stroke-linecap="round" />
            </svg>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="fixed bottom-0 left-0 w-full h-[25%] flex flex-col items-center flex-shrink-0 pt-4 pb-safe justify-between z-10 bg-black/80 border-t border-white/5">
        <div id="shutter-btn" class="w-[72px] h-[72px] rounded-full border-[4px] border-[#444] flex items-center justify-center cursor-pointer active:scale-95 transition-transform mt-2">
            <div class="w-[56px] h-[56px] bg-white rounded-full"></div>
        </div>

        <div class="w-full px-6 flex justify-between items-center pb-6">
            <div id="gallery-btn" class="w-[46px] h-[46px] rounded-full bg-zinc-800 overflow-hidden cursor-pointer active:opacity-70 transition-opacity flex-shrink-0 border border-white/20">
                <img id="gallery-thumbnail" src="" class="w-full h-full object-cover" alt="Gallery">
            </div>
            <div class="flex items-center gap-5 text-[12px] font-bold tracking-widest pl-2">
                <span class="text-white/80 cursor-pointer transition-colors hover:text-white">VIDEO</span>
                <div class="bg-[#1c1c1d]/80 rounded-full px-4 py-1.5 text-[#ffd60a] cursor-pointer shadow-md pointer-events-auto" onclick="openSettings()">PHOTO</div>
            </div>
            <div class="w-[46px] h-[46px] rounded-full glass-ui border border-white/10 flex items-center justify-center text-white cursor-pointer active:bg-[#2c2c2e] transition-colors flex-shrink-0 pointer-events-auto" onclick="toggleCamera()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <polyline points="23 20 23 14 17 14"></polyline>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                </svg>
            </div>
        </div>
    </div>

    <!-- AI Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] hidden items-center justify-center p-4">
        <div class="bg-[#1c1c1d] w-full max-w-sm rounded-2xl p-6 shadow-2xl border border-white/10 pointer-events-auto">
            <h2 class="text-lg font-semibold mb-4 text-[#ffd60a]">AI Magic Settings</h2>
            
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">API Key Gemini (AI Studio):</label>
                <input type="password" id="setting-api-key" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a]" placeholder="AIzaSy...">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Model Gemini:</label>
                <input type="text" id="setting-ai-model" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a]" placeholder="gemini-2.5-flash-image-preview">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Prompt Rahasia:</label>
                <textarea id="setting-prompt" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a] resize-none h-24" placeholder="Prompt image-to-image..."></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-1">Delay transisi fade (detik):</label>
                <input type="number" id="setting-delay" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a]" min="0" step="0.5">
            </div>

            <button onclick="closeSettings()" class="w-full bg-[#ffd60a] text-black font-bold rounded-lg py-3 active:scale-95 transition-transform touch-manipulation">Simpan & Tutup</button>
        </div>
    </div>

    <!-- Fullscreen Gallery Modal -->
    <div id="gallery-modal" class="fixed inset-0 bg-black z-[100] hidden items-center justify-center cursor-pointer">
        <img id="gallery-generated" src="" class="absolute w-full h-full object-contain z-10" alt="Generated">
        <img id="gallery-original" src="" class="absolute w-full h-full object-contain z-20" alt="Original">
    </div>

    <canvas id="photo-canvas" class="hidden"></canvas>

    <script>
        // --- Custom Console Setup ---
        const debugOutput = document.getElementById('debug-output');
        const debugContainer = document.getElementById('debug-console-container');
        let debugVisible = false;

        function appendToConsole(msg, type) {
            const div = document.createElement('div');
            div.className = `debug-msg ${type === 'error' ? 'debug-error' : 'debug-log'}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugOutput.appendChild(div);
            debugOutput.scrollTop = debugOutput.scrollHeight;
        }

        const origLog = console.log;
        const origErr = console.error;

        console.log = (...args) => {
            origLog.apply(console, args);
            appendToConsole(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'log');
        };

        console.error = (...args) => {
            origErr.apply(console, args);
            appendToConsole(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '), 'error');
        };

        function toggleDebug() {
            debugVisible = !debugVisible;
            debugContainer.classList.toggle('hidden', !debugVisible);
            console.log("Debug console: " + (debugVisible ? "ON" : "OFF"));
        }

        function clearDebug() { debugOutput.innerHTML = ''; }
        
        // Sembunyikan debug di awal
        debugContainer.classList.add('hidden');

        // --- PWA Initialization ---
        function initPWA() {
            const manifestContent = {
                name: "AI Magic Camera", short_name: "MagicCam", start_url: ".", display: "standalone",
                background_color: "#000000", theme_color: "#000000",
                icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZDYwYSIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxwYXRoIGQ9Ik0xNC41IDRINTVhMiAyIDAgMCAwIDIgMnYxNGExIDEgMCAwIDEtMSAxSDJhMSAxIDAgMCAxLTEtMVY2YTIgMiAwIDAgMSAyLTJoMy41TDUgNEw4IDJMMTEgNEg1LjUiLz48Y2lyY2xlIGN4PSIxMiIgY3k9IjEzIiByPSIzIi8+PC9zdmc+", sizes: "192x192", type: "image/svg+xml" }]
            };
            const manifestBlob = new Blob([JSON.stringify(manifestContent)], {type: 'application/json'});
            const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
            document.head.appendChild(link);

            if ('serviceWorker' in navigator) {
                const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));`;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(e => console.error("SW Error:", e));
            }
        }
        initPWA();

        // --- Core Application Logic ---
        const videoElement = document.getElementById('camera-stream');
        const shutterBtn = document.getElementById('shutter-btn');
        const flashOverlay = document.getElementById('flash-overlay');
        const flashAutoText = document.getElementById('flash-auto-text');
        const galleryThumbnail = document.getElementById('gallery-thumbnail');
        const galleryModal = document.getElementById('gallery-modal');
        const galleryOriginal = document.getElementById('gallery-original');
        const galleryGenerated = document.getElementById('gallery-generated');
        const settingsModal = document.getElementById('settings-modal');
        const settingApiKey = document.getElementById('setting-api-key');
        const settingAiModel = document.getElementById('setting-ai-model');
        const settingPrompt = document.getElementById('setting-prompt');
        const settingDelay = document.getElementById('setting-delay');
        const canvas = document.getElementById('photo-canvas');
        const ctx = canvas.getContext('2d');

        let currentFacingMode = 'environment'; 
        let currentStream = null;
        let originalImageData = null;
        let generatedImageData = null;
        let isAiReady = false;
        let fadeTriggered = false;
        
        galleryThumbnail.src = `https://picsum.photos/200/200?random=${Math.floor(Math.random() * 1000)}`;

        // Load State
        let userApiKey = localStorage.getItem('gemini_api_key') || "";
        let aiModel = localStorage.getItem('ai_model') || "gemini-2.5-flash-image-preview";
        let aiPromptStr = localStorage.getItem('ai_prompt') || "change this card to two of spades with mainstream card design";
        let fadeDelaySec = parseFloat(localStorage.getItem('fade_delay')) || 2;

        settingApiKey.value = userApiKey;
        settingAiModel.value = aiModel;
        settingPrompt.value = aiPromptStr;
        settingDelay.value = fadeDelaySec;

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
                videoElement.srcObject = stream;
                currentStream = stream;
                videoElement.play();
                console.log("Kamera aktif (" + currentFacingMode + ")");
            } catch (err) {
                console.error("Kamera Error:", err);
            }
        }

        function toggleCamera() {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            videoElement.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            initCamera();
        }

        function openSettings() {
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
            console.log("Buka settings");
        }

        function closeSettings() {
            userApiKey = settingApiKey.value.trim();
            aiModel = settingAiModel.value.trim() || "gemini-2.5-flash-image-preview";
            aiPromptStr = settingPrompt.value;
            fadeDelaySec = parseFloat(settingDelay.value) || 2;

            localStorage.setItem('gemini_api_key', userApiKey);
            localStorage.setItem('ai_model', aiModel);
            localStorage.setItem('ai_prompt', aiPromptStr);
            localStorage.setItem('fade_delay', fadeDelaySec);

            settingsModal.classList.remove('flex');
            settingsModal.classList.add('hidden');
            console.log("Settings disimpan!");
        }

        async function generateAiImage(base64Data) {
            if (!userApiKey) {
                console.error("API Key Kosong!");
                return;
            }
            isAiReady = false;
            flashAutoText.classList.remove('opacity-0');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${userApiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: aiPromptStr }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                        generationConfig: { responseModalities: ["TEXT", "IMAGE"] } 
                    })
                });
                
                if (!response.ok) {
                    const err = await response.text();
                    console.error("API Error:", response.status, err);
                    return;
                }

                const result = await response.json();
                const imgBase = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                if(imgBase) {
                    generatedImageData = `data:image/png;base64,${imgBase}`;
                    isAiReady = true;
                    flashAutoText.classList.add('opacity-0');
                    console.log("AI Ready!");
                } else {
                    console.error("No image part in response");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                flashAutoText.classList.add('opacity-0');
            }
        }

        shutterBtn.addEventListener('click', () => {
            if (videoElement.readyState >= 2) {
                flashOverlay.classList.remove('shutter-flash');
                void flashOverlay.offsetWidth;
                flashOverlay.classList.add('shutter-flash');

                const maxWidth = 800;
                let w = videoElement.videoWidth, h = videoElement.videoHeight;
                if (w > maxWidth) { h = Math.floor((h * maxWidth) / w); w = maxWidth; }

                canvas.width = w; canvas.height = h;
                ctx.save();
                if (currentFacingMode === 'user') { ctx.translate(w, 0); ctx.scale(-1, 1); }
                ctx.drawImage(videoElement, 0, 0, w, h);
                ctx.restore();
                
                originalImageData = canvas.toDataURL('image/jpeg', 0.6);
                galleryThumbnail.src = originalImageData;
                generateAiImage(originalImageData.split(',')[1]);
                console.log("Foto dijepret.");
            }
        });

        document.getElementById('gallery-btn').addEventListener('click', () => {
            if (!originalImageData) return;
            galleryOriginal.src = originalImageData;
            galleryGenerated.src = isAiReady ? generatedImageData : originalImageData; 
            galleryOriginal.style.opacity = '1';
            fadeTriggered = false;
            galleryModal.classList.remove('hidden');
            galleryModal.classList.add('flex', 'fade-in');
        });

        galleryModal.addEventListener('click', () => {
            if (isAiReady && !fadeTriggered && generatedImageData) {
                fadeTriggered = true;
                setTimeout(() => { galleryOriginal.style.opacity = '0'; }, fadeDelaySec * 1000);
            } else {
                galleryModal.classList.add('hidden');
                galleryModal.classList.remove('flex', 'fade-in');
            }
        });

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
