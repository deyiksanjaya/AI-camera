<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Magic Camera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }
        /* Efek glass untuk UI tombol kecil aja */
        .glass-ui {
            background: rgba(28, 28, 29, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .shutter-flash {
            animation: flash 0.15s ease-out;
        }
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        /* Transisi fade untuk gambar AI */
        #gallery-original {
            transition: opacity 1.5s ease-in-out;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-white select-none bg-black">

    <!-- Video Stream Fullscreen (Z-index 0) -->
    <video id="camera-stream" autoplay playsinline muted class="fixed inset-0 w-full h-full object-cover z-0"></video>
    <div id="flash-overlay" class="fixed inset-0 bg-black z-20 opacity-0 pointer-events-none"></div>

    <!-- Notification Banner -->
    <div id="notification-banner" class="fixed top-[-100px] left-1/2 -translate-x-1/2 bg-[#1c1c1d]/90 backdrop-blur-xl text-white px-5 py-3 rounded-full flex items-center gap-3 shadow-2xl transition-all duration-500 ease-out z-[80] pointer-events-none border border-white/10 w-max max-w-[90%]">
        <span id="notification-text" class="text-[14px] font-semibold tracking-wide truncate">Memproses...</span>
    </div>

    <!-- Top Transparent Bar (Hitam tembus pandang tanpa blur) -->
    <div class="fixed top-0 left-0 w-full h-[12%] flex-shrink-0 z-10 bg-black/80 pt-safe">
        <div class="absolute top-1/2 -translate-y-1/2 right-4 glass-ui rounded-full px-3 py-1.5 flex items-center gap-3.5 mt-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>

            <!-- Icon Flash + Indikator AI (A) -->
            <div class="relative flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                <span id="flash-auto-text" class="absolute -right-2 -bottom-1 text-[9px] font-bold bg-[#1c1c1d] text-white rounded-full px-[3px] leading-none tracking-tighter transition-opacity duration-300">A</span>
            </div>

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12h.01M12 12h.01M16 12h.01" stroke-width="2.5" stroke-linecap="round" />
            </svg>
        </div>
    </div>

    <!-- Center Viewfinder Controls (Zoom) -->
    <div class="fixed top-[12%] bottom-[25%] w-full z-10 pointer-events-none flex flex-col justify-end pb-5">
        <div class="flex justify-center items-center gap-5 text-[15px] font-medium tracking-wide pointer-events-auto">
            <span class="text-white drop-shadow-md cursor-pointer" style="text-shadow: 0 1px 4px rgba(0,0,0,0.8);">0,5</span>
            <div class="w-9 h-9 rounded-full glass-ui flex items-center justify-center text-[#ffd60a] shadow-[0_0_10px_rgba(0,0,0,0.3)] text-[14px] font-semibold cursor-pointer border border-white/10">1x</div>
            <span class="text-white drop-shadow-md cursor-pointer" style="text-shadow: 0 1px 4px rgba(0,0,0,0.8);">2</span>
        </div>
    </div>

    <!-- Bottom Transparent Bar (Hitam tembus pandang tanpa blur) -->
    <div class="fixed bottom-0 left-0 w-full h-[25%] flex flex-col items-center flex-shrink-0 pt-4 pb-safe justify-between z-10 bg-black/80 border-t border-white/5">
        <div id="shutter-btn" class="w-[72px] h-[72px] rounded-full border-[4px] border-[#444] flex items-center justify-center cursor-pointer active:scale-95 transition-transform mt-2">
            <div class="w-[56px] h-[56px] bg-white rounded-full"></div>
        </div>

        <div class="w-full px-6 flex justify-between items-center pb-6">
            <!-- Gallery Bulatan -->
            <div id="gallery-btn" class="w-[46px] h-[46px] rounded-full bg-zinc-800 overflow-hidden cursor-pointer active:opacity-70 transition-opacity flex-shrink-0 border border-white/20">
                <img id="gallery-thumbnail" src="https://images.unsplash.com/photo-1611077544835-1886c35c6e94?q=80&w=100&h=100&fit=crop" class="w-full h-full object-cover" alt="Gallery">
            </div>

            <!-- Mode Selector -->
            <div class="flex items-center gap-5 text-[12px] font-bold tracking-widest pl-2">
                <span class="text-white/80 cursor-pointer transition-colors hover:text-white" style="text-shadow: 0 1px 2px rgba(0,0,0,0.5);">VIDEO</span>
                <div class="bg-[#1c1c1d]/80 rounded-full px-4 py-1.5 text-[#ffd60a] cursor-pointer shadow-md" onclick="openSettings()">
                    PHOTO
                </div>
            </div>

            <!-- Flip Camera -->
            <div class="w-[46px] h-[46px] rounded-full glass-ui border border-white/10 flex items-center justify-center text-white cursor-pointer active:bg-[#2c2c2e] transition-colors flex-shrink-0" onclick="toggleCamera()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <polyline points="23 20 23 14 17 14"></polyline>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                </svg>
            </div>
        </div>
    </div>

    <!-- AI Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[70] hidden items-center justify-center">
        <div class="bg-[#1c1c1d] w-[90%] max-h-[85vh] overflow-y-auto rounded-2xl p-6 shadow-2xl border border-white/10">
            <h2 class="text-lg font-semibold mb-4 text-[#ffd60a]">AI Magic Settings</h2>
            
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Gemini API Key (AI Studio):</label>
                <input type="password" id="setting-api-key" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a]" placeholder="AIzaSy...">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Prompt Rahasia:</label>
                <textarea id="setting-prompt" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a] resize-none h-24" placeholder="Prompt image-to-image..."></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-1">Delay transisi fade (detik):</label>
                <input type="number" id="setting-delay" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-[#ffd60a]" min="0" step="0.5">
            </div>

            <button onclick="closeSettings()" class="w-full bg-[#ffd60a] text-black font-bold rounded-lg py-3 active:scale-95 transition-transform">Simpan & Tutup</button>
        </div>
    </div>

    <!-- Gallery Modal with Crossfade -->
    <div id="gallery-modal" class="fixed inset-0 bg-black z-50 hidden items-center justify-center cursor-pointer">
        <img id="gallery-generated" src="" class="absolute w-full h-full object-contain z-10" alt="Generated">
        <img id="gallery-original" src="" class="absolute w-full h-full object-contain z-20" alt="Original">
    </div>

    <canvas id="photo-canvas" class="hidden"></canvas>

    <script>
        // PWA Injection - Buat file manifest dan service worker on-the-fly pakai Blob
        function initPWA() {
            const manifestContent = {
                name: "AI Magic Camera",
                short_name: "MagicCam",
                start_url: ".",
                display: "standalone",
                background_color: "#000000",
                theme_color: "#000000",
                icons: [{
                    src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZDYwYSIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxwYXRoIGQ9Ik0xNC41IDRINTVhMiAyIDAgMCAwIDIgMnYxNGExIDEgMCAwIDEtMSAxSDJhMSAxIDAgMCAxLTEtMVY2YTIgMiAwIDAgMSAyLTJoMy41TDUgNEw4IDJMMTEgNEg1LjUiLz48Y2lyY2xlIGN4PSIxMiIgY3k9IjEzIiByPSIzIi8+PC9zdmc+",
                    sizes: "192x192",
                    type: "image/svg+xml"
                }]
            };
            const manifestBlob = new Blob([JSON.stringify(manifestContent)], {type: 'application/json'});
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            const swCode = `
                const CACHE_NAME = 'magic-cam-v1';
                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', (e) => {
                    self.clients.claim();
                });
                self.addEventListener('fetch', (e) => {
                    if(e.request.url.includes('googleapis')) return;
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline Mode')));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(swBlob);

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register(swUrl)
                        .then(reg => console.log('PWA Service Worker registered'))
                        .catch(err => console.log('SW Registration failed: ', err));
                });
            }
        }
        initPWA();

        const envApiKey = ""; 
        
        const videoElement = document.getElementById('camera-stream');
        const shutterBtn = document.getElementById('shutter-btn');
        const flashOverlay = document.getElementById('flash-overlay');
        const flashAutoText = document.getElementById('flash-auto-text');
        
        const galleryBtn = document.getElementById('gallery-btn');
        const galleryThumbnail = document.getElementById('gallery-thumbnail');
        const galleryModal = document.getElementById('gallery-modal');
        const galleryOriginal = document.getElementById('gallery-original');
        const galleryGenerated = document.getElementById('gallery-generated');
        
        const settingsModal = document.getElementById('settings-modal');
        const settingApiKey = document.getElementById('setting-api-key');
        const settingPrompt = document.getElementById('setting-prompt');
        const settingDelay = document.getElementById('setting-delay');
        const notificationBanner = document.getElementById('notification-banner');
        const notificationText = document.getElementById('notification-text');
        
        const canvas = document.getElementById('photo-canvas');
        const ctx = canvas.getContext('2d');

        let currentFacingMode = 'environment'; 
        let currentStream = null;
        let originalImageData = null;
        let generatedImageData = null;
        let isAiReady = false;
        let fadeTriggered = false;
        
        let userApiKey = localStorage.getItem('gemini_api_key') || "";
        let aiPromptStr = localStorage.getItem('ai_prompt') || "change this card to two of spades with mainstream card design";
        let fadeDelaySec = parseFloat(localStorage.getItem('fade_delay')) || 2;

        settingApiKey.value = userApiKey;
        settingPrompt.value = aiPromptStr;
        settingDelay.value = fadeDelaySec;

        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                currentStream = stream;
            } catch (err) {
                console.error("Gagal akses kamera", err);
            }
        }

        function toggleCamera() {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            videoElement.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            initCamera();
        }

        function openSettings() {
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
        }

        function closeSettings() {
            userApiKey = settingApiKey.value.trim();
            aiPromptStr = settingPrompt.value;
            fadeDelaySec = parseFloat(settingDelay.value) || 2;

            localStorage.setItem('gemini_api_key', userApiKey);
            localStorage.setItem('ai_prompt', aiPromptStr);
            localStorage.setItem('fade_delay', fadeDelaySec);

            settingsModal.classList.remove('flex');
            settingsModal.classList.add('hidden');
        }

        function showNotification(text, duration = 3000) {
            notificationText.textContent = text;
            notificationBanner.style.top = '40px'; 
            if(duration > 0) setTimeout(() => { notificationBanner.style.top = '-100px'; }, duration);
        }

        async function generateAiImage(base64Data) {
            const activeKey = userApiKey || envApiKey;

            if (!activeKey) {
                showNotification("API Key Gemini belum diatur!", 4000);
                return;
            }

            isAiReady = false;
            flashAutoText.classList.remove('opacity-0');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${activeKey}`;
                const payload = {
                    contents: [{
                        parts: [
                            { text: aiPromptStr },
                            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                        ]
                    }],
                    generationConfig: { responseModalities: ["IMAGE"] }
                };

                let retries = 3;
                let delayTime = 1000;

                while (retries > 0) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) throw new Error('API Error');
                        const result = await response.json();
                        
                        const imgBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        
                        if(imgBase64) {
                            generatedImageData = `data:image/png;base64,${imgBase64}`;
                            isAiReady = true;
                            flashAutoText.classList.add('opacity-0');
                            return; 
                        } else throw new Error('No Image found');
                    } catch (error) {
                        retries--;
                        if (retries === 0) {
                            showNotification("Gagal memproses trik. Cek API Key.", 4000);
                            flashAutoText.classList.add('opacity-0');
                            break;
                        }
                        await new Promise(res => setTimeout(res, delayTime));
                        delayTime *= 2;
                    }
                }
            } catch (error) {
                console.error("Critical Error:", error);
                flashAutoText.classList.add('opacity-0');
            }
        }

        shutterBtn.addEventListener('click', () => {
            if (videoElement.readyState >= 2) {
                flashOverlay.classList.remove('shutter-flash');
                void flashOverlay.offsetWidth;
                flashOverlay.classList.add('shutter-flash');

                const maxWidth = 800;
                let w = videoElement.videoWidth || 720;
                let h = videoElement.videoHeight || 1280;

                if (w > maxWidth) {
                    h = Math.floor((h * maxWidth) / w);
                    w = maxWidth;
                }

                canvas.width = w;
                canvas.height = h;

                ctx.save();
                if (currentFacingMode === 'user') {
                    ctx.translate(w, 0);
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(videoElement, 0, 0, w, h);
                ctx.restore();
                
                originalImageData = canvas.toDataURL('image/jpeg', 0.6);
                if(originalImageData.length < 1000) return;

                galleryThumbnail.src = originalImageData;
                const base64ForAi = originalImageData.split(',')[1];
                generateAiImage(base64ForAi);
            }
        });

        galleryBtn.addEventListener('click', () => {
            if (!originalImageData) return;
            
            galleryOriginal.src = originalImageData;
            galleryGenerated.src = isAiReady ? generatedImageData : originalImageData; 
            galleryOriginal.style.opacity = '1';
            fadeTriggered = false;

            galleryModal.classList.remove('hidden');
            galleryModal.classList.add('flex', 'fade-in');
        });

        galleryModal.addEventListener('click', () => {
            if (isAiReady && !fadeTriggered) {
                fadeTriggered = true;
                setTimeout(() => {
                    galleryOriginal.style.opacity = '0'; 
                }, fadeDelaySec * 1000);
            } else {
                galleryModal.classList.add('hidden');
                galleryModal.classList.remove('flex', 'fade-in');
            }
        });

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
